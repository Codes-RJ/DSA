site_name: Data Structures and Algorithms
site_description: Comprehensive DSA learning repository with theory, implementations, and practice problems
site_author: DSA Repository Contributors
site_url: https://Codes-RJ.github.io/DSA/

# Repository
repo_name: Codes-RJ/DSA
repo_url: https://github.com/Codes-RJ/DSA
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2026 DSA Repository Contributors

# Configuration
theme:
  name: material
  language: en
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.png
  logo: assets/logo.png

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - glightbox
  - mermaid2:
      version: 10.6.1
      arguments:
        theme:
          - light
          - dark

# Customization
extra:
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Codes-RJ/DSA
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:materialx.emoji.to_svg
      emoji_index: !!python/name:materialx.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page tree
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Environment Setup: getting-started/environment.md
  - Basics:
    - Learning Basics: basics/learning-basics.md
    - Variables and Data Types: basics/variables.md
    - Control Flow: basics/control-flow.md
    - Functions: basics/functions.md
    - Arrays and Strings: basics/arrays-strings.md
  - Data Structures:
    - Linear Data Structures:
      - Arrays: data-structures/linear/arrays.md
      - Linked Lists: data-structures/linear/linked-lists.md
      - Stacks: data-structures/linear/stacks.md
      - Queues: data-structures/linear/queues.md
    - Non-Linear Data Structures:
      - Trees: data-structures/non-linear/trees.md
      - Graphs: data-structures/non-linear/graphs.md
      - Heaps: data-structures/non-linear/heaps.md
      - Tries: data-structures/non-linear/tries.md
    - Advanced Data Structures:
      - Segment Trees: data-structures/advanced/segment-trees.md
      - Fenwick Trees: data-structures/advanced/fenwick-trees.md
      - Disjoint Set Union: data-structures/advanced/dsu.md
  - Algorithms:
    - Searching: algorithms/searching.md
    - Sorting: algorithms/sorting.md
    - Recursion: algorithms/recursion.md
    - Dynamic Programming: algorithms/dynamic-programming.md
    - Greedy Algorithms: algorithms/greedy.md
    - Graph Algorithms: algorithms/graph-algorithms.md
    - Advanced Topics: algorithms/advanced.md
  - Practice:
    - Pattern Problems: practice/patterns.md
    - Interview Questions: practice/interview.md
    - Problem Solving: practice/problem-solving.md
  - Resources:
    - Study Plans: resources/study-plans.md
    - Templates: resources/templates.md
    - References: resources/references.md
  - Contributing:
    - Guidelines: contributing/guidelines.md
    - Code Style: contributing/code-style.md
    - Documentation: contributing/documentation.md
